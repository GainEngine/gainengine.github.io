<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>GainEngine</title>
  <script>
    // When GitHub Pages gets a direct request for e.g. /privacy,
    // it would normally 404. Instead we redirect to index.html
    // while preserving the path in sessionStorage so App.jsx can read it.
    var path = window.location.pathname;
    sessionStorage.setItem('redirectPath', path);
    window.location.replace('/');
  </script>
</head>
<body></body>
</html>
